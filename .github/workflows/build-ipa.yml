name: Build IPA (Unsigned)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s $(ls -d /Applications/Xcode_16*.app | sort -V | tail -1)
          xcodebuild -version
          xcrun simctl list runtimes

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create XcodeGen spec
        run: |
          cat > project.yml << 'EOF'
          name: UTMify
          options:
            bundleIdPrefix: com.utmify
            deploymentTarget:
              iOS: "16.0"
          settings:
            base:
              CODE_SIGN_IDENTITY: ""
              CODE_SIGNING_REQUIRED: "NO"
              CODE_SIGNING_ALLOWED: "NO"
              DEVELOPMENT_TEAM: ""
              ENABLE_PREVIEWS: "NO"
              COMPILER_INDEX_STORE_ENABLE: "NO"
          targets:
            UTMify:
              type: application
              platform: iOS
              sources:
                - path: UTMify
                  excludes:
                    - "**/*.plist"
              resources:
                - path: UTMify/Assets.xcassets
                - path: UTMify/Fonts
              settings:
                base:
                  INFOPLIST_FILE: UTMify/Info.plist
                  PRODUCT_BUNDLE_IDENTIFIER: com.utmify.app
                  SWIFT_VERSION: "5.0"
                  TARGETED_DEVICE_FAMILY: "1,2"
                  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
                  ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT: "YES"
                  CODE_SIGN_IDENTITY: ""
                  CODE_SIGNING_REQUIRED: "NO"
                  CODE_SIGNING_ALLOWED: "NO"
                  DEVELOPMENT_TEAM: ""
                  ENABLE_PREVIEWS: "NO"
                  SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          EOF

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for iOS Device
        run: |
          xcodebuild build \
            -project UTMify.xcodeproj \
            -scheme UTMify \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_PREVIEWS=NO \
            SWIFT_OPTIMIZATION_LEVEL="-Onone" \
            ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT=YES \
            -destination "generic/platform=iOS" \
            -skipPackagePluginValidation \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "UTMify.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: UTMify.app not found!"
            find build -type d -name "*.app"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          mkdir -p output/Payload
          cp -r "$APP_PATH" output/Payload/
          cd output
          zip -r UTMify.ipa Payload/
          echo "=== IPA created successfully ==="
          ls -la UTMify.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: UTMify-unsigned
          path: output/UTMify.ipa
          retention-days: 90
