name: Build IPA (Unsigned)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create XcodeGen spec
        run: |
          cat > project.yml << 'EOF'
          name: UTMify
          options:
            bundleIdPrefix: com.utmify
            deploymentTarget:
              iOS: "16.0"
          settings:
            base:
              CODE_SIGN_IDENTITY: ""
              CODE_SIGNING_REQUIRED: "NO"
              CODE_SIGNING_ALLOWED: "NO"
              DEVELOPMENT_TEAM: ""
          targets:
            UTMify:
              type: application
              platform: iOS
              sources:
                - path: UTMify
                  excludes:
                    - "**/*.plist"
              resources:
                - path: UTMify/Assets.xcassets
                - path: UTMify/Fonts
              settings:
                base:
                  INFOPLIST_FILE: UTMify/Info.plist
                  PRODUCT_BUNDLE_IDENTIFIER: com.utmify.app
                  SWIFT_VERSION: "5.0"
                  TARGETED_DEVICE_FAMILY: "1,2"
                  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
                  CODE_SIGN_IDENTITY: ""
                  CODE_SIGNING_REQUIRED: "NO"
                  CODE_SIGNING_ALLOWED: "NO"
                  DEVELOPMENT_TEAM: ""
          EOF

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Show project structure
        run: |
          echo "=== Project files ==="
          find UTMify -type f | head -50
          echo "=== Xcode schemes ==="
          xcodebuild -project UTMify.xcodeproj -list

      - name: Build for iOS Device
        run: |
          xcodebuild build \
            -project UTMify.xcodeproj \
            -scheme UTMify \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            -destination "generic/platform=iOS"

      - name: Find and package IPA
        run: |
          echo "=== Looking for .app ==="
          find build -name "*.app" -type d
          
          APP_PATH=$(find build/DerivedData -name "UTMify.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: UTMify.app not found!"
            find build -type d | head -30
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          mkdir -p output/Payload
          cp -r "$APP_PATH" output/Payload/
          cd output
          zip -r UTMify.ipa Payload/
          echo "=== IPA created ==="
          ls -la UTMify.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: UTMify-unsigned
          path: output/UTMify.ipa
          retention-days: 90
