name: Build iOS (.ipa) - Capacitor

# App web (Capacitor) empacotado num .ipa NAO ASSINADO, direto no runner macOS.
# Build rapido (~1-2 min) pois nao compila codigo nativo pesado.
# Para instalar em iPhone real: sideload (AltStore/Sideloadly) ou assinatura Apple.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Adicionar plataforma iOS (Capacitor)
        run: npx cap add ios

      - name: Sincronizar web -> iOS
        run: npx cap sync ios

      - name: Build do archive (sem assinatura)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/App.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM=""

      - name: Empacotar .ipa (unsigned)
        run: |
          mkdir -p build/Payload
          APP=$(ls -d build/App.xcarchive/Products/Applications/*.app | head -n1)
          echo "App: $APP"
          cp -R "$APP" build/Payload/
          cd build
          zip -qr app-ios-unsigned.ipa Payload
          ls -lh app-ios-unsigned.ipa

      - name: Definir nome da release
        id: rel
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "name=Build ${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publicar na Release do GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: ${{ steps.rel.outputs.name }}
          files: build/app-ios-unsigned.ipa
          fail_on_unmatched_files: true
