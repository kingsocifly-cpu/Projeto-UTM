name: Build iOS (.ipa) no GitHub

# Compila o app DIRETO num runner macOS do GitHub (sem Expo/EAS, sem conta externa).
# Gera um .ipa NAO ASSINADO e anexa numa Release.
# Para instalar em iPhone real depois: use sideload (AltStore/Sideloadly) ou
# configure assinatura da Apple (requer Apple Developer Program).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar projeto iOS nativo (expo prebuild)
        run: npx expo prebuild --platform ios --no-install

      - name: Instalar CocoaPods
        run: |
          cd ios
          pod install

      - name: Descobrir workspace e scheme
        id: xc
        run: |
          WS=$(ls ios | grep '\.xcworkspace$' | head -n1)
          SCHEME=$(basename "$WS" .xcworkspace)
          echo "workspace=ios/$WS" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Workspace: ios/$WS | Scheme: $SCHEME"

      - name: Compilar (archive sem assinatura)
        run: |
          xcodebuild \
            -workspace "${{ steps.xc.outputs.workspace }}" \
            -scheme "${{ steps.xc.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/App.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Empacotar .ipa (nao assinado)
        run: |
          mkdir -p build/Payload
          APP=$(ls -d build/App.xcarchive/Products/Applications/*.app | head -n1)
          echo "App encontrado: $APP"
          cp -R "$APP" build/Payload/
          cd build
          zip -qr app-ios-unsigned.ipa Payload
          ls -lh app-ios-unsigned.ipa

      - name: Publicar na Release do GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Build #{0}', github.run_number) }}
          files: build/app-ios-unsigned.ipa
          fail_on_unmatched_files: true
